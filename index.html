<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .page {
      display: none;
      padding-top: 80px;
      opacity: 0;
      transition: 0.4s;
    }

    .active {
      display: block;
      opacity: 1;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      margin: auto;
      border-radius: 15px;
      width: 80%;
      max-width: 350px;
    }

    button, input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button {
      background: white;
      color: #007BFF;
      font-weight: bold;
      cursor: pointer;
    }

    #startScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #countdown {
      font-size: 70px;
    }

    #bigWish {
      font-size: 40px;
      text-shadow: 0 0 15px white;
    }

    .spark {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    #cake {
      width: 220px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <button onclick="startSite()">Tap to Start 🎬</button>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="card">
    <h2>Password 🔐</h2>
    <input type="password" id="pass">
    <br>
    <button onclick="checkPass()">Unlock</button>
    <p id="wrong"></p>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="card">
    <h2>Ready? 🎂</h2>
    <button onclick="nextPage()">Next</button>
  </div>
</div>

<!-- COUNTDOWN -->
<div id="pageCount" class="page">
  <h1 id="countdown">3</h1>
</div>

<!-- BIG WISH -->
<div id="pageWish" class="page">
  <div id="bigWish">🎉 HAPPY BIRTHDAY 🎉</div>
</div>
